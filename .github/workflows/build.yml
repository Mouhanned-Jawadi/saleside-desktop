name: Build Desktop App

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
            artifact-path: "release/*.exe"
          - os: macos-latest
            script: dist:mac
            artifact-path: "release/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout desktop app
        uses: actions/checkout@v4

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          repository: Mohanad-Ahmed-ETG/SaleSide-Front-2.0
          token: ${{ secrets.GH_PAT }}
          path: frontend

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Copy frontend dist into desktop app
        shell: bash
        run: cp -r frontend/dist/. dist/

      - name: Install desktop dependencies
        run: npm ci

      - name: Build (${{ matrix.os }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release upload "v${VERSION}" ${{ matrix.artifact-path }} --clobber --repo Mouhanned-Jawadi/saleside-desktop
